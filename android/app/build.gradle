plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "github.nelikkkl.com"
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "github.nelikkkl.com"
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName "1.1.0"
    }

    buildTypes {
        debug {
            // Disable debug symbols and shrink resources in debug build
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            minifyEnabled false
            shrinkResources false
            multiDexEnabled false
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
        }
    }

    // Split APKs by ABI for release (each ~20-30MB instead of one fat APK)
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "armeabi-v7a"
            universalApk false
        }
    }

    aaptOptions {
        ignoreAssetsPattern "!mipmap-512"
        cruncherEnabled false
    }

    packagingOptions {
        // Strip debug symbols from native libs
        jniLibs {
            useLegacyPackaging false
        }
    }
}

flutter {
    source "../.."
}
