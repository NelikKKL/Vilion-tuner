name: 🎻 Build APK

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 🧪 Test
        run: flutter test

      - name: 🗑️ Remove invalid resource dirs
        run: rm -rf android/app/src/main/res/mipmap-512

      - name: 🔨 Build APK (arm64, release-signed-with-debug-key)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: violin-tuner-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ APK ready!',
                '',
                `📦 [Download APK](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `🔖 Commit: \`${context.sha.substring(0, 7)}\``,
                `🏗️ Build: #${context.runNumber}`,
                '',
                '> arm64-v8a release build (~20-35 MB)',
              ].join('\n')
            })
