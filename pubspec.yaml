name: violin_tuner
description: Violin Tuner & Metronome app with Material You support

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  dynamic_color: 1.7.0
  record: 5.1.2
  audioplayers: 6.0.0
  permission_handler: 11.3.1
  provider: 6.1.2

dependency_overrides:
  # Force exact versions — prevents transitive resolution pulling newer breaking builds
  dynamic_color: 1.7.0
  record: 5.1.2
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
