name: violin_tuner
description: Violin Tuner & Metronome app with Material You support

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Flutter 3.22 compatible version (1.8.x breaks with toARGB32)
  dynamic_color: ^1.7.0

  # record 5.x — pin to avoid record_linux pulling in
  record: 5.1.2

  audioplayers: ^6.0.0
  permission_handler: ^11.3.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
