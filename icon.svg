<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#2d2d2d"/>

  <!-- Violin body + neck group (white silhouette, rotated ~-35deg, centered-left) -->
  <g transform="translate(430, 480) rotate(-38)">
    <!-- Neck -->
    <rect x="-14" y="-310" width="28" height="200" rx="8" fill="#dce0e8"/>
    <!-- Scroll/peg box at top -->
    <ellipse cx="0" cy="-315" rx="22" ry="14" fill="#dce0e8"/>
    <rect x="-8" y="-340" width="16" height="30" rx="5" fill="#dce0e8"/>
    <!-- Pegs -->
    <rect x="-30" y="-325" width="20" height="7" rx="3" fill="#dce0e8"/>
    <rect x="10" y="-318" width="20" height="7" rx="3" fill="#dce0e8"/>
    <rect x="-32" y="-308" width="20" height="7" rx="3" fill="#dce0e8"/>
    <rect x="12" y="-300" width="20" height="7" rx="3" fill="#dce0e8"/>

    <!-- Upper bout -->
    <ellipse cx="0" cy="-85" rx="82" ry="95" fill="#dce0e8"/>
    <!-- Waist -->
    <rect x="-52" y="-30" width="104" height="70" rx="0" fill="#dce0e8"/>
    <!-- Waist cutouts (c-bouts) -->
    <ellipse cx="-52" cy="5" rx="28" ry="38" fill="#2d2d2d"/>
    <ellipse cx="52" cy="5" rx="28" ry="38" fill="#2d2d2d"/>
    <!-- Lower bout -->
    <ellipse cx="0" cy="120" rx="100" ry="115" fill="#dce0e8"/>

    <!-- f-holes -->
    <ellipse cx="-28" cy="-10" rx="6" ry="18" fill="#2d2d2d"/>
    <ellipse cx="-28" cy="50" rx="6" ry="18" fill="#2d2d2d"/>
    <rect x="-34" y="15" width="12" height="8" rx="2" fill="#2d2d2d"/>

    <ellipse cx="28" cy="-10" rx="6" ry="18" fill="#2d2d2d"/>
    <ellipse cx="28" cy="50" rx="6" ry="18" fill="#2d2d2d"/>
    <rect x="22" y="15" width="12" height="8" rx="2" fill="#2d2d2d"/>

    <!-- Bridge -->
    <rect x="-22" y="26" width="44" height="8" rx="2" fill="#2d2d2d"/>

    <!-- Tailpiece -->
    <path d="M-20 185 L20 185 L14 230 L-14 230 Z" fill="#dce0e8"/>

    <!-- Bow (long diagonal stick) -->
    <rect x="60" y="-330" width="10" height="560" rx="5" fill="#dce0e8" transform="rotate(8, 65, 0)"/>
    <!-- Bow hair (thinner line) -->
    <rect x="50" y="-330" width="4" height="555" rx="2" fill="#dce0e8" opacity="0.5" transform="rotate(8, 52, 0)"/>
    <!-- Bow frog -->
    <rect x="46" y="205" width="28" height="20" rx="4" fill="#dce0e8" transform="rotate(8, 60, 215)"/>
  </g>

  <!-- Tuner/clip icon (bottom right area) -->
  <g transform="translate(640, 700)">
    <!-- Rounded rectangle background -->
    <rect x="-140" y="-80" width="280" height="160" rx="42" fill="#dce0e8"/>
    <!-- Inner dark area (screen) -->
    <rect x="-110" y="-52" width="220" height="104" rx="24" fill="#3a3a3a"/>
    <!-- Center bar (meter needle indicator) -->
    <rect x="-16" y="-42" width="32" height="84" rx="8" fill="#dce0e8"/>
    <!-- Left indicator dot -->
    <rect x="-80" y="-12" width="40" height="24" rx="6" fill="#dce0e8" opacity="0.3"/>
    <!-- Right indicator dot -->
    <rect x="40" y="-12" width="40" height="24" rx="6" fill="#dce0e8" opacity="0.3"/>
  </g>
</svg>
